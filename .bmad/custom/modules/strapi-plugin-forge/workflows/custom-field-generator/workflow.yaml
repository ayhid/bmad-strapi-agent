# Custom Field Generator - Create Custom Field Types for Strapi
name: 'custom-field-generator'
description: 'Create custom field types for Strapi content editor with validation and Design System integration'
author: 'Ayoub'

# Paths
installed_path: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/custom-field-generator'
template: false # Action workflow
instructions: '{installed_path}/instructions.md'
validation: '{installed_path}/checklist.md'

# Critical variables from module config
config_source: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/config.yaml'
plugin_output_path: '{config_source}:plugin_output_path'
code_quality_level: '{config_source}:code_quality_level'
user_name: '{config_source}:user_name'
communication_language: '{config_source}:communication_language'
output_folder: '{config_source}:output_folder'
date: system-generated

# Frontend agent workflow (Jamil)
frontend_workflow: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/generate-ui/workflow.yaml'

# Invocation control
standalone: true
