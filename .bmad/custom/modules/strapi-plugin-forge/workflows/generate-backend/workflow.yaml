# Generate Backend - Strapi v5 Server-Side Code Generation
name: 'generate-backend'
description: 'Generate complete Strapi v5 backend code including content-types, services, controllers, routes, and plugin lifecycle'
author: 'Ayoub'

# Paths
installed_path: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/generate-backend'
template: false # Action workflow
instructions: '{installed_path}/instructions.md'

# Critical variables from module config
config_source: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/config.yaml'
strapi_version: '{config_source}:strapi_version'
code_quality_level: '{config_source}:code_quality_level'
user_name: '{config_source}:user_name'
communication_language: '{config_source}:communication_language'
output_folder: '{config_source}:output_folder'
date: system-generated

# Invocation control
standalone: false # Only called by other workflows/agents
