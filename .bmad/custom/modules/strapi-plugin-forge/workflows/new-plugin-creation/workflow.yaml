# New Plugin Creation - Complete Strapi v5 Plugin Generation
name: 'new-plugin-creation'
description: 'Create complete Strapi v5 plugin from concept to functional prototype - orchestrates architecture, backend, frontend, tests, code review, and documentation'
author: 'Ayoub'

# Paths
installed_path: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/new-plugin-creation'
template: false # Action workflow - generates plugin code, not documents
instructions: '{installed_path}/instructions.md'
validation: '{installed_path}/checklist.md'

# Critical variables from module config
config_source: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/config.yaml'
strapi_project_path: '{config_source}:strapi_project_path'
plugin_output_path: '{config_source}:plugin_output_path'
code_quality_level: '{config_source}:code_quality_level'
strapi_version: '{config_source}:strapi_version'
user_name: '{config_source}:user_name'
communication_language: '{config_source}:communication_language'
output_folder: '{config_source}:output_folder'
date: system-generated

# Agent workflow paths - for orchestration
backend_workflow: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/generate-backend/workflow.yaml'
frontend_workflow: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/generate-ui/workflow.yaml'
test_workflow: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/generate-tests/workflow.yaml'
review_workflow: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/review-plugin/workflow.yaml'
docs_workflow: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/generate-docs/workflow.yaml'

# Output configuration
# Plugin will be generated to: {plugin_output_path}/{plugin_name}/
plugin_registry_path: '{config_source}:plugin_registry_path'

# Invocation control
standalone: true
