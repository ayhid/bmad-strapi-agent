# Plugin Audit & Optimization - Review Existing Plugins
name: 'plugin-audit'
description: 'Analyze existing plugin, generate audit report, identify improvements, optional auto-refactoring'
author: 'Ayoub'

# Paths
installed_path: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/plugin-audit'
template: false # Action workflow - generates audit report
instructions: '{installed_path}/instructions.md'
validation: '{installed_path}/checklist.md'

# Critical variables from module config
config_source: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/config.yaml'
code_quality_level: '{config_source}:code_quality_level'
strapi_version: '{config_source}:strapi_version'
user_name: '{config_source}:user_name'
communication_language: '{config_source}:communication_language'
output_folder: '{config_source}:output_folder'
date: system-generated

# Code reviewer workflow (Basir)
review_workflow: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/review-plugin/workflow.yaml'

# Invocation control
standalone: true
