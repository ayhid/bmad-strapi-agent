# Documentation Generator - Auto-generate Plugin Documentation
name: 'documentation-generator'
description: 'Generate comprehensive plugin documentation from code - README, API docs, usage guides, configuration'
author: 'Ayoub'

# Paths
installed_path: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/documentation-generator'
template: false # Action workflow
instructions: '{installed_path}/instructions.md'
validation: '{installed_path}/checklist.md'

# Critical variables from module config
config_source: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/config.yaml'
user_name: '{config_source}:user_name'
communication_language: '{config_source}:communication_language'
output_folder: '{config_source}:output_folder'
date: system-generated

# Technical writer workflow (Muin)
docs_workflow: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/generate-docs/workflow.yaml'

# Invocation control
standalone: true
