# Quick Scaffold - Fast Plugin Scaffolding for Experienced Developers
name: 'quick-scaffold'
description: 'Fast scaffolding for experienced developers - minimal questions, basic plugin structure, ready for manual development'
author: 'Ayoub'

# Paths
installed_path: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/workflows/quick-scaffold'
template: false # Action workflow
instructions: '{installed_path}/instructions.md'
validation: '{installed_path}/checklist.md'

# Critical variables from module config
config_source: '{project-root}/.bmad/custom/modules/strapi-plugin-forge/config.yaml'
plugin_output_path: '{config_source}:plugin_output_path'
template_library_path: '{config_source}:template_library_path'
strapi_version: '{config_source}:strapi_version'
user_name: '{config_source}:user_name'
communication_language: '{config_source}:communication_language'
output_folder: '{config_source}:output_folder'
date: system-generated

# Invocation control
standalone: true
